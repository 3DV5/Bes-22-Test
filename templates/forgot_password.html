{% extends 'base.html' %}
{% block title %}Recuperar Senha{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-8 col-md-5 col-lg-4">
    <div class="card shadow-sm mt-4">
      <div class="card-body p-4">
        <h5 class="card-title fw-bold mb-3">
          <i class="bi bi-key me-1 text-primary"></i>Recuperar Senha
        </h5>

        {% if message %}
          <div class="alert alert-success small">
            <i class="bi bi-check-circle me-1"></i>{{ message }}
          </div>
        {% endif %}

        <p class="text-muted small">
          Informe seu e-mail cadastrado e enviaremos as instruções para redefinir sua senha.
        </p>

        <form method="post" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">E-mail cadastrado</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" id="email" name="email" class="form-control"
                     placeholder="seu@email.com" autocomplete="email">
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-send me-1"></i>Enviar instruções
          </button>
        </form>

        <hr class="my-3">
        <a href="{{ url_for('login') }}" class="text-muted small">
          <i class="bi bi-arrow-left me-1"></i>Voltar ao login
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
